<!DOCTYPE html>
<html>
    <head>
        <title>Scrimbafy Me!</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,900&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
    </head>
    <body>
        <section class="intro">
            <h1>Turn your<strong> drone idea</strong> into a <strong>flying reality</strong></h1>
            <span class="beta-text">Currently in Beta</span>
            <p class="top-text">Ahmad's Hobby Club</p>
        </section>
        
        <main class="main-content">
            <h2>Conquer The Sky</h2>
            <span class="subheading">Register Now</span>
            
            <p>Making your dream drones have never been easier. Join the group and collaborate with others to make your next masterpeice.</p>
            
            <form>
                <input type="text" required placeholder="Name" aria-label="Name">
                <input type="email" required  placeholder="Email" aria-label="Email">
                <button class="btn btn-primary">Submit</button>
            </form>   
            <p class="fine-print">We'll never share your information without permission</p>
        </main>
    </body>
</html>
